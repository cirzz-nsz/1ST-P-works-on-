<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login CRUD</title>
    <style> 
        body {
            font-family: Arial, sans-serif;
            background-color: #17f1df;
            /* fuente de todo lo seleccionado y cambia el color por su codigo de color hexadecimal */
        }

        h2 {
            font-size: 35px;
            font-family: 'Courier New', Courier, monospace;
            /* lo mismo solo que lo unico que cambia es que lo aplica a el texto o h2 que refiere a el titulo  */
            
        }

        label {
            
        }
        div {
            background-color: #ffffff;
            width: 200px;
            height: 200px;
            padding: 100px;
            border-radius: 12px;
            margin: 100px auto;
            /* background color: el color de fondo de el div, width: el ancho de el div, padding: espacio entre el contenido y el borde de el div, border-radius: redondeo de las esquinas de el div, margin: espacio entre el div y otros elementos */
        }

        input {
           
        }

        button {
            border-radius: 12%;
            width: 100px;
            height: 25px;
            background-color: #82a8ff;
            color: #00ffc6;
            /* border: bordes de el boton, width-height: tamaño de el boton, 
            backround color: el color de el fondo de el boton, y color : color de las letras de el boton */
        }

        button:hover {
            border-radius: 15%;
            width: 110px;
            height: 35px;
            background-color: #5a688a;
            color: #ffffff;
            cursor: pointer;
            /* lo mismo pero reacciona a el puntero en el boton y cambia varias cosas
             cursor: cambia la forma de el cursor */
        }

        a {
           
        }

        a:hover {
            
        }
    </style>

</head>


<body>
    <div>
        <h2>Login</h2>

        <input type="hidden" id="password_indice">

        <label>Usuario:</label>
        <input type="text" id="login_user">
        <br><br>
        
        <label>Contraseña:</label>
        <input type="text" id="login_password">
        <br><br>

        <button id="login_button" onclick="aceptar()">Login</button>  
        |
        <a href="registro.html">Registrarse</a>
        
    </div>
    <script src="index.js"></script>
</body>
</html>
