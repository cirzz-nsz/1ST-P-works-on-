<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Register CRUD</title>
    <style> 
         body {
            font-family: Arial, sans-serif;
            background-color: #7d76b9;
            /* fuente de todo lo seleccionado y cambia el color por su codigo de color hexadecimal */
        }

        h2 {
            font-size: 35px;
            font-family: 'Courier New', Courier, monospace;
            /* lo mismo solo que lo unico que cambia es que lo aplica a el texto o h2 que refiere a el titulo  */
            
        }

        label {
            width: 30px;
            height: 40px;
            color:#000000
        }
        div {
            background-color: #0cb7e2;
            width: 225px;
            height: 200px;
            padding: 100px;
            border-radius: 12px;
            margin: 100px auto;
            /* background color: el color de fondo de el div, width: el ancho de el div, padding: espacio entre el contenido y el borde de el div, border-radius: redondeo de las esquinas de el div, margin: espacio entre el div y otros elementos */
        }

        input {
           background-color: rgb(29, 103, 146);
           color: #ffffff;
        }

        button {
            border-radius: 12%;
            width: 100px;
            height: 25px;
            background-color: #2e56b3;
            color: #000000;
            /* border: bordes de el boton, width-height: tamaño de el boton, 
            backround color: el color de el fondo de el boton, y color : color de las letras de el boton */
        }

        button:hover {
            border-radius: 15%;
            width: 110px;
            height: 35px;
            background-color: #5a688a;
            color: #ffffff;
            cursor: pointer;
            /* lo mismo pero reacciona a el puntero en el boton y cambia varias cosas
             cursor: cambia la forma de el cursor */
        }

        a {
           color:#000000
        }

        a:hover {
            color :rgb(255, 255, 255)
        }
    </style>
</head>

<body>
    <div>   
        <h2>Registro</h2>

        <input type="hidden" id="html_indice">

        <label>Usuario:</label>
        <input type="text" id="register_user">
        <br><br>
        
        <label>Contraseña:</label>
        <input type="text" id="register_password">
        <br><br>

        <button id="register_guardar" onclick="guardar()">Guardar</button>
        |
        <a href="index.html">Iniciar Sesión</a>

    </div>
    <script src="registro.js"></script>
</body>
</html>
