<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Estudiantes</title>
    <!-- Style es para el css en html y el link ref es para conectar las paginas con css
     esta funciona por rel la hoja de calculo y href la ruta del archivo css -->
    <link rel="stylesheet"  href="crudmateo.css">
</head>
<body>
    <div>
        <h2>CRUD DE ESTUDIANTES</h2>
        <a href="index.html"><img src="left-arrow_2990220.png"> Volver al Login</a>
        <!-- Imagenes agregadas junto a la redireccion
        Aun no se puede mover ni cambiar de lugar pero es funcional y entendible -->
        <br><br>

        <!-- FORMULARIO -->
        <input type="hidden" id="html_indice">

        <label>Nombre:</label>
        <input type="text" id="html_nombre">
        <br><br>
        
        <label>Apellido:</label>
        <input type="text" id="html_apellido">
        <br><br>

        <label>NIE:</label>
        <input type="text" id="html_nie">
        <br><br>

        <label>Edad:</label>
        <input type="number" id="html_edad">
        <br><br>

        <button id="boton_guardar" onclick="guardar()">Guardar</button>
        <button id="boton_actualizar" onclick="actualizar()">Actualizar</button>
        <button onclick="limpiar()">Limpiar</button>
        <a href="grafica.html">Ver Gráfica</a>

        <hr>

        <h3>Lista de Registros</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>NIE</th>
                    <th>Edad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

    <script src="crud.js"></script>
</body>
</html>
